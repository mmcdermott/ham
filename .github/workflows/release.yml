name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # OIDC: lets npm mint a short-lived token via trusted publishing (no
  # NPM_TOKEN secret) and auto-attach provenance. Requires a trusted publisher
  # configured for each package on npmjs.com pointing at this repo + workflow.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      # OIDC trusted publishing needs npm CLI >= 11.5.1 (Node 22.x already
      # satisfies the >= 22.14.0 requirement). changeset publish shells out to
      # this npm, so upgrading it here is what makes OIDC work — pnpm's own
      # publish does not support OIDC yet.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest
      # Gate releases on the build + test suite: a broken main can still open a
      # Version Packages PR, but it can never tag a release.
      - name: Build packages
        run: pnpm build
      - name: Test
        run: pnpm test
      - name: Create release PR or tag release
        uses: changesets/action@v1
        with:
          # `pnpm run` is required — bare `pnpm version` is an npm passthrough
          # that prints the version table and never executes the script.
          version: pnpm run version-packages
          # When a Version Packages PR merges, `pnpm release` builds and runs
          # `changeset publish`, which publishes every package whose version is
          # not yet on npm and creates the matching git tags + GitHub Releases.
          # Already-published versions are skipped, so re-runs are safe.
          # Auth is OIDC trusted publishing (no NPM_TOKEN) — see the id-token
          # note above and CONTRIBUTING.md. Provenance is attached automatically.
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
